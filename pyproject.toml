[project]
name = "atomforge"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Mads-Peter", email = "machri@phys.au.dk" }
]
requires-python = ">=3.12"
dependencies = [
    "ase>=3.28.0",
    "numpy>=2.4.4",
    "pydantic>=2.12.5",
    "rich>=14.3.3",
]

[project.scripts]
atomforge = "atomforge:main"

[build-system]
requires = ["uv_build>=0.8.18,<0.9.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 88

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.10",
]

[tool.pytest.ini_options]
testpaths = ["tests/"]
addopts = [
  "--cov-report", "term",
#   "--cov-report", "html:.coverage-html",
#   "--cov-report", "xml:.coverage.xml",
#   "--junitxml", ".report.xml",
  "--cov", "src/atomforge"
]

[tool.coverage.run]
omit = []

