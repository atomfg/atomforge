[project]
name = "atomforge-builtins"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Mads-Peter", email = "machri@phys.au.dk" }
]
requires-python = ">=3.10"
dependencies = [
    "atomforge-core",
]

[project.entry-points.'atomforge.task']
single_point = "atomforge_builtins.task.single_point.manifest:single_point_manifest"
bfgs = "atomforge_builtins.task.bfgs.manifest:bfgs_manifest"
atomic_descriptor = "atomforge_builtins.task.atomic_descriptor.manifest:atomic_descriptor_manifest"

[project.entry-points.'atomforge.model']
lennard_jones = "atomforge_builtins.model.ase_lj.manifest:lennard_jones_manifest"
no_dep = "atomforge_builtins.model.nodep_model:no_dep_manifest"


[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "atomforge-runtime",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.uv.sources]
atomforge_core = { path="../atomforge-core", editable=true }
atomforge_runtime = { path="../atomforge-runtime", editable=true }
