[project]
name = "atomforge-runtime"
version = "0.1.0a1"
description = "Atomforge runtime package."
readme = "README.md"
authors = [
    { name = "Mads-Peter", email = "machri@phys.au.dk" }
]
requires-python = ">=3.10"
dependencies = [
    "atomforge-core",
    "pydantic>=2",
]

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.uv.sources]
atomforge_core = { path="../atomforge-core", editable=true }
